<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nimbus — Weather Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="container">

    <header class="header">
      <div class="logo">NIMBUS</div>
      <p class="tagline">Real-time weather intelligence</p>
    </header>

    <div class="search-wrapper">
      <div class="search-box">
        <input
          type="text"
          id="cityInput"
          placeholder="Enter city name..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="searchBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="errorMsg" class="error-msg hidden"></div>
    <div id="loader" class="loader hidden">
      <div class="spinner"></div>
      <span>Fetching weather...</span>
    </div>

    <div id="weatherCard" class="weather-card hidden">

      <div class="card-top">
        <div class="location-info">
          <h1 class="city-name" id="cityName">—</h1>
          <span class="country-badge" id="countryBadge">—</span>
        </div>
        <div class="weather-icon-wrap">
          <img id="weatherIcon" src="" alt="weather icon" />
          <p class="condition" id="condition">—</p>
        </div>
      </div>

      <div class="temp-display">
        <span class="temp-value" id="temperature">—</span>
        <span class="temp-unit">°C</span>
      </div>
      <p class="feels-like">Feels like <span id="feelsLike">—</span>°C</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Humidity</span>
            <span class="stat-value" id="humidity">—</span>
            <span class="stat-unit">%</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Wind Speed</span>
            <span class="stat-value" id="windSpeed">—</span>
            <span class="stat-unit">km/h</span>
          </div>
        </div>
      </div>

    </div>

    <p class="hint" id="hint">Search a city to get started ↑</p>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
