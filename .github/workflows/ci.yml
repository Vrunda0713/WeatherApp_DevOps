name: CI/CD Pipeline - Weather Dashboard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Test & Lint ────────────────────────────────────────
  test:
    name: Run Tests & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8 (Static Code Analysis)
        run: |
          flake8 app/ tests/ run.py --max-line-length=100 --ignore=E302,F841

      - name: Run Pytest (Unit Tests)
        run: |
          pytest tests/ -v --tb=short

  # ── Job 2: Docker Build ───────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t weather-dashboard:${{ github.sha }} .

      - name: Verify Docker image runs
        run: |
          docker run -d -p 5000:5000 \
            -e OPENWEATHER_API_KEY=test_key \
            --name weather-test \
            weather-dashboard:${{ github.sha }}
          sleep 5
          curl -f http://localhost:5000/ || exit 1
          docker stop weather-test

  # ── Job 3: Deploy to Render ───────────────────────────────────
  deploy:
    name: Deploy to Render (Staging)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
